name: Quality & Security (Go)

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

permissions:
    contents: read

concurrency:
    group: quality-security-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-and-test:
        name: Code Quality – Format, Vet & Tests
        runs-on: ubuntu-latest

        services:
            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            postgres:
                image: postgres:17-alpine
                ports:
                    - 5432:5432
                env:
                    POSTGRES_DB: postgres
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                options: >-
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26.1"
                  cache: true

            - name: Check gofmt (no files should change)
              run: |
                  files="$(gofmt -l .)"
                  if [ -n "$files" ]; then
                    echo "The following files are not gofmt'ed:"
                    echo "$files"
                    exit 1
                  fi

            - name: Run go vet
              run: go vet ./...

            - name: Run tests (memory mode)
              run: go test ./... -v -race
              env:
                  DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable

            - name: Run tests (distributed mode — with Redis)
              run: go test ./... -v -race
              env:
                  REDIS_URL: redis://localhost:6379
                  DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable

    security:
        name: Dependency Security Scan (govulncheck)
        runs-on: ubuntu-latest
        needs: lint-and-test

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26.1"
                  cache: true

            - name: Install govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@latest

            - name: Run govulncheck
              run: |
                  "$(go env GOPATH)/bin/govulncheck" ./...
    policy-check:
        name: Policy as Code (Conftest)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Install conftest
              run: |
                  VERSION="0.66.0"
                  wget -q "https://github.com/open-policy-agent/conftest/releases/download/v${VERSION}/conftest_${VERSION}_Linux_x86_64.tar.gz"
                  tar xzf "conftest_${VERSION}_Linux_x86_64.tar.gz"
                  sudo mv conftest /usr/local/bin/

            - name: Run Conftest (OPA)
              run: conftest test Dockerfile --policy policy/

    build:
        name: Production Build Validation
        runs-on: ubuntu-latest
        needs: [lint-and-test, security]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26.1"
                  cache: true

            - name: Build all packages
              run: go build -o ./bin/wacraft-server
